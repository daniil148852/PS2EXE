name: Build SoulStealer EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install PS2EXE
        shell: powershell
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module ps2exe -Force -Scope CurrentUser

      - name: Compile ps1 to exe
        shell: powershell
        run: |
          # Без иконки
          Invoke-ps2exe .\soulstealer.ps1 .\soulstealer.exe -noConsole -requireAdmin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: soulstealer-exe
          path: soulstealer.exe
